# Publish releases when version tags are created
# Supports both stable releases (v1.2.0) and alpha releases (v1.2.0-alpha.0)
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Publish Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'              # Stable: v1.2.3
      - 'v[0-9]+.[0-9]+.[0-9]+-alpha.[0-9]+' # Alpha: v1.2.0-alpha.0
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for npm provenance and OIDC authentication
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v5.0.0
        with:
          version: 10

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Print publish diagnostics
        run: |
          echo "GITHUB_EVENT_NAME=$GITHUB_EVENT_NAME"
          echo "GITHUB_REF=$GITHUB_REF"
          echo "GITHUB_REF_NAME=$GITHUB_REF_NAME"
          echo "GITHUB_REPOSITORY=$GITHUB_REPOSITORY"
          echo "GITHUB_WORKFLOW=$GITHUB_WORKFLOW"
          echo "npm version: $(npm --version)"
          echo "node version: $(node --version)"
          echo "pnpm version: $(pnpm --version)"
          echo "npm registry: $(npm config get registry)"
          node -e 'const p=require("./package.json"); console.log(JSON.stringify({name:p.name, version:p.version, repository:p.repository, publishConfig:p.publishConfig || null, bin:p.bin}, null, 2));'

      - name: Detect release type and publish
        env:
          # Force npm to use OIDC trusted publishing instead of the token-based
          # .npmrc that setup-node prepares when registry-url is configured.
          NODE_AUTH_TOKEN: ""
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/trusted-publish.npmrc
        run: |
          cat > "$NPM_CONFIG_USERCONFIG" <<'EOF'
          registry=https://registry.npmjs.org/
          EOF

          # Get the tag from the ref
          TAG=${GITHUB_REF#refs/tags/}
          echo "Processing tag: $TAG"

          # Determine if this is an alpha release
          if [[ "$TAG" =~ -alpha\.[0-9]+$ ]]; then
            echo "🔷 Detected alpha release"
            echo "Publishing with --tag alpha"
            npm publish --provenance --access public --tag alpha --loglevel verbose
          else
            echo "✅ Detected stable release"
            echo "Publishing with --tag latest"
            npm publish --provenance --access public --loglevel verbose
          fi
